name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage -- --runInBand

      - name: Create backend test environment
        working-directory: backend
        env:
          NEON_TEST_DATASOURCE_URL: ${{ secrets.NEON_TEST_DATASOURCE_URL }}
          NEON_TEST_FLYWAY_URL: ${{ secrets.NEON_TEST_FLYWAY_URL }}
          NEON_TEST_USERNAME: ${{ secrets.NEON_TEST_USERNAME }}
          NEON_TEST_PASSWORD: ${{ secrets.NEON_TEST_PASSWORD }}
          JWT_SIGNER_KEY: ${{ secrets.JWT_SIGNER_KEY }}
        run: |
          {
            printf '%s\n' "NEON_TEST_DATASOURCE_URL=${NEON_TEST_DATASOURCE_URL}"
            printf '%s\n' "NEON_TEST_FLYWAY_URL=${NEON_TEST_FLYWAY_URL}"
            printf '%s\n' "NEON_TEST_USERNAME=${NEON_TEST_USERNAME}"
            printf '%s\n' "NEON_TEST_PASSWORD=${NEON_TEST_PASSWORD}"
            printf '%s\n' "JWT_SIGNER_KEY=${JWT_SIGNER_KEY}"
          } > .env.test.local

      - name: Validate backend CI secrets
        env:
          NEON_TEST_DATASOURCE_URL: ${{ secrets.NEON_TEST_DATASOURCE_URL }}
          NEON_TEST_FLYWAY_URL: ${{ secrets.NEON_TEST_FLYWAY_URL }}
          NEON_TEST_USERNAME: ${{ secrets.NEON_TEST_USERNAME }}
          NEON_TEST_PASSWORD: ${{ secrets.NEON_TEST_PASSWORD }}
          JWT_SIGNER_KEY: ${{ secrets.JWT_SIGNER_KEY }}
        run: |
          test -n "$NEON_TEST_DATASOURCE_URL"
          test -n "$NEON_TEST_FLYWAY_URL"
          test -n "$NEON_TEST_USERNAME"
          test -n "$NEON_TEST_PASSWORD"
          test -n "$JWT_SIGNER_KEY"
          test "${#JWT_SIGNER_KEY}" -ge 32

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          NEON_TEST_DATASOURCE_URL: ${{ secrets.NEON_TEST_DATASOURCE_URL }}
          NEON_TEST_FLYWAY_URL: ${{ secrets.NEON_TEST_FLYWAY_URL }}
          NEON_TEST_USERNAME: ${{ secrets.NEON_TEST_USERNAME }}
          NEON_TEST_PASSWORD: ${{ secrets.NEON_TEST_PASSWORD }}
          JWT_SIGNER_KEY: ${{ secrets.JWT_SIGNER_KEY }}
        run: ./scripts/test-with-env.sh

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report

      - name: Upload backend test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
