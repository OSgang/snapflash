# Server configuration
# Render provides PORT automatically. Locally, the default is 8080.
server.address=0.0.0.0
server.port=${PORT:8080}

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Flyway migration configuration
spring.flyway.url=${SPRING_FLYWAY_URL:${SPRING_DATASOURCE_URL}}
spring.flyway.user=${SPRING_FLYWAY_USER:${SPRING_DATASOURCE_USERNAME}}
spring.flyway.password=${SPRING_FLYWAY_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}

# Tesseract OCR configuration
tesseract.datapath=${TESSERACT_DATAPATH:/usr/share/tesseract-ocr/5/tessdata/}

# File upload configuration
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

# JWT configuration
JWT_SIGNER_KEY=${JWT_SIGNER_KEY}

# Sentry monitoring
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:production}
sentry.release=${SENTRY_RELEASE:snapflash-backend@1.0.0}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:1.0}
sentry.send-default-pii=false