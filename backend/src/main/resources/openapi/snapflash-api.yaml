openapi: 3.0.3
info:
  title: SnapFlash API
  version: 1.0.0
  description: |
    SnapFlash Backend API Documentation.

    This API provides endpoints for:
    - User authentication (register/login)
    - Deck management
    - Flashcard creation and management
    - Text scanning with OCR and dictionary lookup

    Authentication is handled via HTTP cookies (user_id).
  contact:
    name: OSgang
    url: https://github.com/OSgang/snapflash
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.snapflash.app
    description: Production server

security:
  - cookieAuth: []

tags:
  - name: User
    description: User authentication and management
  - name: Deck
    description: Deck management operations
  - name: Card
    description: Flashcard operations
  - name: Scan
    description: OCR scanning and text processing

paths:
  /user/register:
    post:
      tags: [User]
      summary: Register a new user
      description: Creates a new user account with email, username, and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreationRequest'
            examples:
              valid:
                summary: Valid registration request
                value:
                  email: "user@example.com"
                  username: "testuser"
                  password: "securePassword123"
      responses:
        '200':
          description: User successfully created
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 200
                  message: "Success"
                  result:
                    email: "phuc@gmail.com"
                    username: "phuc"
                    userid: "xxxxxx-xxxxxx-xxxxx-xxxxxx"

        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email or username already exists
          content:
            text/plain:
              schema:
                type: string
                example: "Email already exists."

  /user/login:
    post:
      tags: [User]
      summary: Login user
      description: Send a JWT to client.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
            examples:
              valid:
                summary: Valid login request
                value:
                  username: "testuser"
                  password: "securePassword123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 200
                  message: "Success"
                  result:
                    email: "phuc@gmail.com"
                    username: "phuc"
                    userid: "xxxxxx-xxxxxx-xxxxx-xxxxxx"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/logout:
    post:
      tags: [ User ]
      summary: User logouts of app
      description: Invalidate current access token or session.
      responses:
        '200':
          description: Logout successful
          content:
            text/plain:
              schema:
                type: string
                example: "Logout successful"

