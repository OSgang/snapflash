spring.datasource.url=${NEON_TEST_DATASOURCE_URL}
spring.datasource.username=${NEON_TEST_USERNAME}
spring.datasource.password=${NEON_TEST_PASSWORD}

spring.flyway.enabled=true
spring.flyway.url=${NEON_TEST_FLYWAY_URL}
spring.flyway.user=${NEON_TEST_USERNAME}
spring.flyway.password=${NEON_TEST_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate

tesseract.datapath=/tmp
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

sentry.dsn=
sentry.environment=test
sentry.traces-sample-rate=0.0
