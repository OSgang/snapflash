sonar.projectKey=OSgang_snapflash
sonar.organization=osgang

sonar.sources=app,screens,components,hooks,constants,backend/src/main/kotlin
sonar.tests=__tests__,backend/src/test/kotlin
sonar.test.inclusions=__tests__/**/*.test.tsx,__tests__/**/*.test.ts,backend/src/test/kotlin/**/*.kt
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.jacoco.xmlReportPaths=backend/build/reports/jacoco/test/jacocoTestReport.xml

sonar.exclusions=backend/build/**,backend/.gradle/**,node_modules/**,coverage/**,test-report/**,.expo/**,dist/**,web-build/**
sonar.coverage.exclusions=app/**,components/**,hooks/**,constants/**
